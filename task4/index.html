<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Control Basics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="box1">
    <h2>Box 1</h2>
    <p>This box is normal and demonstrates display and overflow behavior.</p>
</div>

<div class="box2">
    <h2>Box 2</h2>
    <p>This box is positioned and overlaps Box 1.</p>
</div>

<div class="hidden-box">
    <h2>Hidden Box</h2>
    <p>This box is hidden using visibility property.</p>
</div>
</body>
</html>
