<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Image Gallery</h1>
    
    <div class="gallery">
        <div class="image-box">
            <h3>object-fit: Cover</h3>
            <img src="image1.jpg" alt="flower" class="cover" width="300">
        </div>
        <div class="image-box">
            <h3>object-fit: Contain</h3>
            <img src="image2.jpg" alt="flower2" class="Contain" width="300">
        </div>
    </div>
</body>
</html>
